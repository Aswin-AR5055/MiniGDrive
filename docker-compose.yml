version: "3.9"

services:
  db:
    image: postgres:15
    container_name: gdrive_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - minigdrive_db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"

  app:
    build: .
    container_name: gdrive
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "6000:6000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
    volumes:
      - ./minigdrive_data/uploads:/app/uploads
      - ./minigdrive_data/trash:/app/trash
      - ./minigdrive_data/storage:/app/storage
      - ./minigdrive_data/profiles:/app/static/profiles

volumes:
  minigdrive_db_data:
