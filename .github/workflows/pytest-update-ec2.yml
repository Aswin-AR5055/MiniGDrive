name: CI/CD - Docker Compose + Nginx

on:
  push:
    branches:
      - testbranch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Upload Nginx config
      run: |
        scp -o StrictHostKeyChecking=no ./nginx/minigdrive.conf ubuntu@${{ secrets.INSTANCE_IP2 }}:/tmp/minigdrive.conf

    - name: SSH into EC2 and Deploy App
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.INSTANCE_IP2 }} << 'EOF'
          set -e

          echo "[+] Updating packages..."
          sudo apt-get update -y

          echo "[+] Installing Docker & Docker Compose..."
          if ! command -v docker &> /dev/null; then
            sudo apt-get install -y docker.io
            sudo usermod -aG docker ubuntu
          fi
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          echo "[+] Ensuring persistent directories exist..."
          mkdir -p ~/MiniGDrive/minigdrive_data/{uploads,trash,storage,profiles}
          sudo chown -R ubuntu:ubuntu ~/MiniGDrive/minigdrive_data

          echo "[+] Moving Nginx config into place..."
          sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
          sudo mv /tmp/minigdrive.conf /etc/nginx/sites-available/minigdrive
          sudo ln -sf /etc/nginx/sites-available/minigdrive /etc/nginx/sites-enabled/minigdrive
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo fuser -k 80/tcp || true
          sudo systemctl restart nginx

          echo "[+] Cloning or updating repository..."
          if [ ! -d "~/MiniGDrive" ]; then
            git clone https://github.com/Aswin-AR5055/MiniGDrive.git ~/MiniGDrive
          fi
          cd ~/MiniGDrive
          git fetch --all
          git reset --hard origin/testbranch

          echo "[+] Stopping existing containers..."
          docker-compose down || true

          echo "[+] Starting Docker Compose with environment variables..."
          export POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          export POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          export POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          export POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
          export SECRET_KEY=${{ secrets.SECRET_KEY }}
          docker-compose up -d --build

          echo "[+] Deployment complete. Current running containers:"
          docker ps
        EOF
