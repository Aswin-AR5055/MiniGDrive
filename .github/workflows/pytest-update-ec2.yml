name: CI/CD - Docker Compose

on:
  push:
    branches:
      - testbranch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        pip install pytest
        pytest

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: SSH into EC2 and Deploy with Docker Compose
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.INSTANCE_IP2 }} << 'EOF'
          set -e

          if ! command -v docker &> /dev/null
          then
            echo "Docker not found. Installing..."
            sudo apt update
            sudo apt install -y docker.io
            sudo systemctl enable --now docker
            sudo usermod -aG docker \$USER
          else
            echo "Docker already installed. Skipping."
          fi

          if ! command -v docker-compose &> /dev/null
          then
            echo "Docker Compose not found. Installing..."
            sudo apt update
            sudo apt install -y curl jq
            DOCKER_COMPOSE_VERSION=\$(curl -s https://api.github.com/repos/docker/compose/releases/latest | jq -r .tag_name)
            sudo curl -L "https://github.com/docker/compose/releases/download/\${DOCKER_COMPOSE_VERSION}/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          else
            echo "Docker Compose already installed. Skipping."
          fi

          docker-compose --version

          if [ ! -d "MiniGDrive" ]; then
            git clone https://github.com/Aswin-AR5055/MiniGDrive.git MiniGDrive
          fi

          cd MiniGDrive
          git fetch --all
          git reset --hard origin/testbranch

          docker-compose down
          docker-compose build
          docker-compose up -d

          echo "[+] Deployment complete. Running containers:"
          docker ps
        EOF
