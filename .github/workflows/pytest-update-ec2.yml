name: CI/CD - Docker Compose + Nginx

on:
  push:
    branches:
      - testbranch

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest psycopg2-binary

    - name: Run tests
      env:
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        FLASK_ENV: testing
      run: pytest -v

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Upload Nginx config
      run: |
        scp -o StrictHostKeyChecking=no nginx/minigdrive.conf ubuntu@${{ secrets.INSTANCE_IP2 }}:/tmp/minigdrive.conf

    - name: SSH into EC2 and Deploy App
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.INSTANCE_IP2 }} << 'EOF'
          set -e

          # Update packages
          sudo apt-get update -y

          # Install Docker if missing
          if ! command -v docker &> /dev/null; then
            sudo apt-get install -y docker.io
            sudo usermod -aG docker ubuntu
          fi

          # Install Docker Compose if missing
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # Install Nginx if missing
          if ! command -v nginx &> /dev/null; then
            sudo apt-get install -y nginx
          fi
          sudo systemctl enable nginx
          sudo systemctl restart nginx

          # Clone or update repo
          if [ ! -d "MiniGDrive" ]; then
            git clone https://github.com/Aswin-AR5055/MiniGDrive.git
          fi
          cd MiniGDrive
          git fetch --all
          git reset --hard origin/testbranch

          # Persistent directories
          mkdir -p ./minigdrive_data/uploads ./minigdrive_data/trash ./minigdrive_data/storage ./minigdrive_data/profiles
          sudo chown -R ubuntu:ubuntu ./minigdrive_data

          # Move Nginx config
          sudo mv /tmp/minigdrive.conf /etc/nginx/sites-available/minigdrive
          sudo ln -sf /etc/nginx/sites-available/minigdrive /etc/nginx/sites-enabled/minigdrive
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo fuser -k 80/tcp || true
          sudo systemctl restart nginx

          # Stop existing containers
          sudo docker-compose down || true

          # Write secrets to .env
          cat > .env << ENV
POSTGRES_USER=${{ secrets.POSTGRES_USER }}
POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
POSTGRES_DB=${{ secrets.POSTGRES_DB }}
POSTGRES_HOST=db
POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
SECRET_KEY=${{ secrets.SECRET_KEY }}
ENV

          # Start Docker Compose
          sudo docker-compose up -d --build

          echo "[+] Deployment complete. Current running containers:"
          docker ps
        EOF
