name: CI/CD - Docker Compose

on:
  push:
    branches:
      - testbranch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        pip install pytest
        pytest

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.5.3
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: SSH into EC2 and Deploy with Docker Compose
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.INSTANCE_IP2 }} << 'EOF'
          set -e

          # Clone or update repo
          if [ ! -d "MiniGDrive" ]; then
            git clone https://github.com/Aswin-AR5055/MiniGDrive.git MiniGDrive
          fi

          cd MiniGDrive
          git fetch --all
          git reset --hard origin/testbranch

          # Stop existing containers
          docker-compose down

          # Build and start containers
          docker-compose build
          docker-compose up -d

          echo "[+] Deployment complete. Running containers:"
          docker ps
        EOF
